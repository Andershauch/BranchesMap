name: Jobindsats Daily Import

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * *"

jobs:
  import-jobindsats:
    runs-on: windows-latest
    timeout-minutes: 45
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      JOBINDSATS_API_TOKEN: ${{ secrets.JOBINDSATS_API_TOKEN }}
      APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
      FOLLOW_CHECK_SECRET: ${{ secrets.FOLLOW_CHECK_SECRET }}
      NODE_ENV: production

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Run daily Jobindsats batch
        run: npm run jobindsats:daily

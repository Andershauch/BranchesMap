<!doctype html>
<html lang="da">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f8faf7" />
    <title>JOBVEJ Offline</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f8faf7;
        --text: #171d1c;
        --muted: #4b6265;
        --card: rgba(255, 255, 255, 0.86);
        --border: rgba(255, 255, 255, 0.72);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding:
          calc(env(safe-area-inset-top, 0px) + 1.5rem)
          calc(env(safe-area-inset-right, 0px) + 1.25rem)
          calc(env(safe-area-inset-bottom, 0px) + 1.5rem)
          calc(env(safe-area-inset-left, 0px) + 1.25rem);
        background:
          radial-gradient(circle at top, rgba(159, 238, 245, 0.42), transparent 28%),
          linear-gradient(180deg, #fcfdfb 0%, var(--bg) 100%);
        color: var(--text);
        font-family: "Segoe UI Variable", "Segoe UI", Arial, sans-serif;
      }

      main {
        width: min(100%, 28rem);
        border: 1px solid var(--border);
        border-radius: 1.75rem;
        background: var(--card);
        padding: 1.5rem;
        backdrop-filter: blur(18px);
        box-shadow: 0 18px 48px rgba(15, 23, 42, 0.12);
      }

      h1 {
        margin: 0;
        font-size: 1.75rem;
        line-height: 1.1;
      }

      p {
        margin: 0.9rem 0 0;
        line-height: 1.6;
        color: var(--muted);
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        margin-top: 1.2rem;
        min-height: 3rem;
        border-radius: 999px;
        background: #0f172a;
        color: white;
        padding: 0 1rem;
        text-decoration: none;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Du er offline</h1>
      <p>JOBVEJ kunne ikke hente nyt indhold lige nu. Prøv igen, når forbindelsen er tilbage.</p>
      <a href="/da">Prøv igen</a>
    </main>
  </body>
</html>
